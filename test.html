<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Globo 3D - Voos</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #05070b;
      --panel: rgba(10, 14, 22, 0.72);
      --line: rgba(255, 255, 255, 0.16);
      --text: #f7f3e8;
      --muted: #aeb9c8;
      --cyan: #62e4ff;
      --green: #8df2ad;
      --gold: #ffd166;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
    }

    #globe {
      position: fixed;
      inset: 0;
      cursor: grab;
    }

    #globe:active {
      cursor: grabbing;
    }

    .hud {
      position: fixed;
      left: clamp(18px, 4vw, 56px);
      top: clamp(18px, 4vw, 48px);
      width: min(420px, calc(100vw - 36px));
      pointer-events: none;
      z-index: 2;
    }

    h1 {
      margin: 0;
      max-width: 11ch;
      font-size: clamp(42px, 8vw, 72px);
      line-height: 0.94;
      font-weight: 760;
      letter-spacing: 0;
    }

    .lede {
      margin: 12px 0 0;
      max-width: 34rem;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 16px;
      pointer-events: auto;
    }

    button {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 12px;
      color: var(--text);
      background: var(--panel);
      font: inherit;
      font-size: 13px;
      backdrop-filter: blur(16px);
      cursor: pointer;
      transition: border-color 160ms ease, background 160ms ease;
    }

    button:hover,
    button.active {
      border-color: rgba(98, 228, 255, 0.72);
      background: rgba(16, 28, 40, 0.78);
    }

    .status {
      position: fixed;
      right: clamp(14px, 3vw, 38px);
      bottom: clamp(14px, 3vw, 34px);
      width: min(320px, calc(100vw - 28px));
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      background: var(--panel);
      backdrop-filter: blur(18px);
      z-index: 2;
    }

    .status strong {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: var(--cyan);
    }

    .status span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .metric-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    .metric {
      border-top: 1px solid var(--line);
      padding-top: 8px;
      min-width: 0;
    }

    .metric b {
      display: block;
      color: var(--gold);
      font-size: 16px;
      line-height: 1;
    }

    .metric small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }

    .hint {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      padding: 8px 11px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: rgba(247, 243, 232, 0.84);
      background: rgba(5, 7, 11, 0.62);
      backdrop-filter: blur(12px);
      font-size: 12px;
      pointer-events: none;
      z-index: 2;
    }

    .globe-tooltip {
      padding: 8px 10px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 6px;
      background: rgba(5, 7, 11, 0.86);
      color: #fff;
      font-size: 11px;
      line-height: 1.35;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.32);
    }

    @media (max-width: 720px) {
      h1 {
        font-size: 42px;
      }

      .lede {
        display: none;
      }

      .controls {
        margin-top: 10px;
      }

      button {
        min-height: 36px;
        padding: 0 10px;
        font-size: 12px;
      }

      .status {
        display: none;
      }
    }
  </style>
</head>

    <h1>Voos 3D</h1>

      <div class="metric">

        <small>ano</small>
      </div>
    </div>
  </aside>

          routes.set(key, {
            startLat: lat1,
            startLng: lng1,
            endLat: lat2,
            endLng: lng2,
            color: colorMap[f.t] || '#62e4ff',
            name: `${f.o} → ${f.d}`
          });
        }
      });
      return Array.from(routes.values());
    }

    const globe = Globe()
      .backgroundColor('rgba(0,0,0,0)')
      .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
      .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
      .showAtmosphere(true)
      .atmosphereColor('#62e4ff')
      .atmosphereAltitude(0.14)
      .pointsData(airportList)
      .pointLat('lat')
      .pointLng('lng')
      .pointAltitude(0.025)
      .pointRadius(0.28)
      .pointResolution(12)
      .pointColor('color')
      .pointLabel(p => `<div class="globe-tooltip"><strong>${p.id}</strong></div>`)
      .arcsData(getRoutes())
      .arcColor('color')
      .arcDashLength(0.4)
      .arcDashGap(0.15)
      .arcDashAnimateTime(2200)
      .arcAltitudeAutoScale(0.3)
      .arcStroke(0.5)
      (document.querySelector('#globe'));

    globe.controls().autoRotate = true;
    globe.controls().autoRotateSpeed = 0.35;
    globe.controls().enableDamping = true;
    globe.controls().dampingFactor = 0.08;
    globe.controls().minDistance = 140;
    globe.controls().maxDistance = 480;

    // Year buttons
    const controls = document.querySelector('#controls');
    for (let y = 2007; y <= 2026; y++) {
      const btn = document.createElement('button');
      btn.textContent = y;
      btn.classList.toggle('active', y === currentYear);
      btn.addEventListener('click', () => {
        document.querySelectorAll('#controls button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentYear = y;
        updateGlobe();
      });
      controls.appendChild(btn);
    }

    function updateGlobe() {
      const routes = getRoutes();
      const airports = new Set(routes.flatMap(r => [
        airportList.find(a => a.lat === r.startLat && a.lng === r.startLng)?.id,
        airportList.find(a => a.lat === r.endLat && a.lng === r.endLng)?.id
      ]).filter(Boolean));

      globe.arcsData(routes);
      document.querySelector('#metric-routes').textContent = routes.length;
      document.querySelector('#metric-airports').textContent = airports.size;
      document.querySelector('#metric-year').textContent = currentYear;
      document.querySelector('#selected-title').textContent = `Ano ${currentYear}`;
    }

    window.addEventListener('resize', () => {
      globe.width(window.innerWidth).height(window.innerHeight);
    });

    globe.width(window.innerWidth).height(window.innerHeight);
    globe.pointOfView({ lat: -15, lng: -45, altitude: 2.1 }, 0);
    updateGlobe();
  </script>
</body>
</html>
