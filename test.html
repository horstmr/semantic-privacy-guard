<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Globo - v0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e1a;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center}
canvas{display:block}
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// Coastlines dataset
const COAST=[
[[-81,-4],[-80,-6],[-79,-8],[-77,-12],[-76,-14],[-74,-18],[-71,-18],[-70,-23],[-71,-30],[-73,-37],[-74,-42],[-74,-46],[-75,-50],[-74,-53],[-69,-55],[-66,-55],[-65,-48],[-62,-41],[-58,-38],[-57,-35],[-58,-34],[-56,-34],[-53,-34],[-51,-31],[-48,-28],[-48,-25],[-46,-24],[-44,-23],[-42,-23],[-40,-21],[-39,-18],[-39,-15],[-37,-12],[-35,-9],[-35,-5],[-38,-4],[-41,-3],[-44,-2],[-48,-1],[-50,0],[-51,4],[-50,5],[-52,5],[-54,6],[-58,7],[-60,9],[-62,10],[-64,10],[-66,11],[-70,12],[-72,12],[-72,9],[-75,9],[-77,8],[-78,6],[-78,2],[-80,0],[-81,-2],[-81,-4]],
[[-83,8],[-83,11],[-84,11],[-86,12],[-88,16],[-87,21],[-90,21],[-91,19],[-95,18],[-97,16],[-100,17],[-104,19],[-106,23],[-110,24],[-112,26],[-110,30],[-114,30],[-115,28],[-114,23],[-110,22],[-106,21],[-105,20],[-103,18],[-100,16]],
[[-114,30],[-117,33],[-120,34],[-122,37],[-124,40],[-124,46],[-123,48],[-125,50],[-130,54],[-133,57],[-138,59],[-148,60],[-153,59],[-158,57],[-162,55],[-165,60],[-164,63],[-161,64],[-166,66],[-162,70],[-156,71],[-148,70],[-141,70],[-130,70],[-125,70],[-115,68],[-105,68],[-95,68],[-85,68],[-80,73],[-78,73],[-75,68],[-68,63],[-64,60],[-60,56],[-56,53],[-56,50],[-60,47],[-64,46],[-67,45],[-70,42],[-74,40],[-76,37],[-76,35],[-81,31],[-81,25],[-83,25],[-85,30],[-89,30],[-94,29],[-97,28],[-97,26],[-99,26]],
[[-45,60],[-43,60],[-40,64],[-38,66],[-33,68],[-25,70],[-22,70],[-20,73],[-22,76],[-31,78],[-45,82],[-58,82],[-65,80],[-58,76],[-53,69],[-50,64],[-48,60],[-45,60]],
[[-10,36],[-9,38],[-9,43],[-2,44],[-1,46],[-4,48],[-5,49],[-1,50],[2,51],[4,52],[7,53],[8,57],[10,57],[10,54],[13,54],[14,54],[19,55],[21,56],[24,57],[28,60],[30,60],[29,62],[25,65],[21,65],[22,70],[26,71],[31,70],[38,68],[45,68],[55,68],[68,68],[75,73],[80,73],[100,77],[105,78],[113,74],[114,73],[127,73],[140,73],[160,70],[170,69],[180,68],[180,65],[170,60],[162,60],[155,57],[156,52],[160,53],[163,57],[170,60],[163,52],[158,52],[156,50],[154,48],[150,45],[145,44],[143,49],[140,52],[135,55],[130,52],[130,48],[128,43],[126,40],[122,40],[121,38],[122,37],[120,35],[122,32],[121,30],[119,26],[117,24],[115,23],[113,22],[110,21],[108,16],[109,11],[105,9],[103,1],[104,1],[100,7],[98,8],[98,11],[99,14],[98,16],[97,16],[94,16],[91,22],[88,22],[87,21],[81,16],[80,13],[77,8],[76,9],[75,15],[73,16],[73,21],[70,21],[67,24],[62,25],[57,25],[56,27],[54,26],[51,30],[48,30],[49,27],[50,24],[47,17],[43,13],[44,12],[51,12],[51,11],[48,8],[43,4],[41,-2],[40,-7],[40,-11],[40,-16],[35,-20],[35,-23],[33,-26],[32,-29],[28,-33],[25,-34],[20,-35],[18,-34],[17,-29],[15,-26],[13,-23],[12,-17],[13,-12],[13,-8],[9,-2],[9,3],[5,5],[0,5],[-5,5],[-8,5],[-12,8],[-16,12],[-17,15],[-16,20],[-13,25],[-10,29],[-10,36]],
[[-5,50],[-3,51],[0,51],[1,53],[-1,54],[-3,55],[-5,57],[-6,58],[-8,57],[-6,55],[-5,54],[-5,52],[-5,50]],
[[114,-22],[114,-26],[116,-32],[119,-34],[124,-34],[129,-32],[134,-33],[138,-35],[141,-38],[145,-38],[148,-38],[150,-37],[153,-31],[153,-28],[152,-25],[149,-21],[146,-19],[143,-15],[142,-11],[140,-17],[137,-12],[136,-12],[133,-12],[130,-12],[127,-14],[123,-17],[121,-20],[114,-22]],
];

const canvas=document.getElementById('canvas');
const W=window.innerWidth, H=window.innerHeight;

const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:false});
renderer.setSize(W,H);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(45,W/H,0.1,100);
camera.position.set(0,0,2.5);

const globe=new THREE.Group();
scene.add(globe);

// Ocean - azul claro
globe.add(new THREE.Mesh(
  new THREE.SphereGeometry(1,128,128),
  new THREE.MeshPhongMaterial({color:0x1e5a96,shininess:20})
));

// Converter lat/lon para 3D
function ll2v(lat,lon,r=1){
  const phi=(90-lat)*Math.PI/180;
  const theta=(lon+180)*Math.PI/180;
  return new THREE.Vector3(
    -r*Math.sin(phi)*Math.cos(theta),
    r*Math.cos(phi),
    r*Math.sin(phi)*Math.sin(theta)
  );
}

// Desenhar continentes
function drawLands(){
  const landsMat=new THREE.MeshBasicMaterial({color:0x15803d,side:THREE.DoubleSide});
  const coastMat=new THREE.LineBasicMaterial({color:0x22c55e});

  COAST.forEach(poly=>{
    const pts=[];

    for(let i=0;i<poly.length-1;i++){
      const [lon1,lat1]=poly[i];
      const [lon2,lat2]=poly[i+1];
      const segs=Math.max(2,Math.ceil(Math.hypot(lon2-lon1,lat2-lat1)/1.5));

      for(let j=0;j<=segs;j++){
        const t=j/segs;
        pts.push(ll2v(lat1+(lat2-lat1)*t,lon1+(lon2-lon1)*t,1.0015));
      }
    }

    // Desenhar linhas de costa
    for(let i=0;i<pts.length-1;i++){
      const p1=pts[i],p2=pts[i+1];
      const mid=new THREE.Vector3().addVectors(p1,p2).multiplyScalar(0.5);
      const len=p1.distanceTo(p2);
      const tube=new THREE.CylinderGeometry(0.004,0.004,len,6);
      const mesh=new THREE.Mesh(tube,coastMat);
      mesh.position.copy(mid);
      mesh.lookAt(p2);
      mesh.rotateX(Math.PI/2);
      globe.add(mesh);
    }
  });
}

drawLands();

// Carregar TopoJSON para preencher continentes
fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
  .then(r=>r.json())
  .then(topo=>{
    const tf=topo.transform,arcs=topo.arcs;
    function decode(i){
      const raw=i<0?[...arcs[~i]].reverse():arcs[i];
      let x=0,y=0;const out=[];
      for(const d of raw){x+=d[0];y+=d[1];out.push([x*tf.scale[0]+tf.translate[0],y*tf.scale[1]+tf.translate[1]]);}
      return out;
    }
    function addRing(ringArcs){
      const lonlat=[];
      for(const ai of ringArcs){const seg=decode(ai);for(const p of seg)lonlat.push(p);}
      const pts=[];
      for(let i=0;i<lonlat.length-1;i++){
        const [lo1,la1]=lonlat[i],[lo2,la2]=lonlat[i+1];
        const n=Math.max(2,Math.ceil(Math.hypot(lo2-lo1,la2-la1)/3));
        for(let j=0;j<=n;j++){const t=j/n;pts.push(ll2v(la1+(la2-la1)*t,lo1+(lo2-lo1)*t,1.001));}
      }
      if(pts.length>2){
        const shape=new THREE.Shape();
        pts.forEach((p,i)=>{
          const screen=new THREE.Vector3().copy(p);
          if(i===0)shape.moveTo(screen.x,screen.y);
          else shape.lineTo(screen.x,screen.y);
        });
      }
    }
    const obj=topo.objects.countries;
    const geoms=obj.type==='GeometryCollection'?obj.geometries:[obj];
    for(const gm of geoms){
      if(gm.type==='Polygon')for(const ring of gm.arcs)addRing(ring);
      else if(gm.type==='MultiPolygon')for(const poly of gm.arcs)for(const ring of poly)addRing(ring);
    }
  }).catch(()=>{});

// Iluminação
scene.add(new THREE.AmbientLight(0xffffff,0.9));
const directional=new THREE.DirectionalLight(0xffffff,0.6);
directional.position.set(3,2,4);
scene.add(directional);

// Interação - rotação manual
let rotX=0, rotY=0;
let isDrag=false, lastX=0, lastY=0;

canvas.addEventListener('mousedown',(e)=>{
  isDrag=true;
  lastX=e.clientX;
  lastY=e.clientY;
  e.preventDefault();
});

document.addEventListener('mouseup',()=>{
  isDrag=false;
});

document.addEventListener('mousemove',(e)=>{
  if(!isDrag)return;
  const dX=e.clientX-lastX;
  const dY=e.clientY-lastY;
  rotY+=dX*0.007;
  rotX+=dY*0.007;
  rotX=Math.max(-Math.PI/2.2,Math.min(Math.PI/2.2,rotX));
  lastX=e.clientX;
  lastY=e.clientY;
});

// Animação
function animate(){
  requestAnimationFrame(animate);
  globe.rotation.y=rotY;
  globe.rotation.x=rotX;
  renderer.render(scene,camera);
}

animate();

// Responsivo
window.addEventListener('resize',()=>{
  const nW=window.innerWidth, nH=window.innerHeight;
  camera.aspect=nW/nH;
  camera.updateProjectionMatrix();
  renderer.setSize(nW,nH);
});
</script>
</body>
</html>
