function ll2v(lat,lon,r=1){
  const phi=(90-lat)*Math.PI/180,th=(lon+180)*Math.PI/180;
  return new THREE.Vector3(-r*Math.sin(phi)*Math.cos(th),r*Math.cos(phi),r*Math.sin(phi)*Math.sin(th));
}

// Draw coastlines on globe — tries to load detailed countries from CDN
// (works when opened locally / online); falls back to embedded COAST offline.
const coastMat=new THREE.LineBasicMaterial({color:0x5588dd,opacity:.75,transparent:true,linewidth:1.5});

function drawLandFill(){
  COAST.forEach(poly=>{
    try{
      const pts2d=poly.map(([lon,lat])=>{
        const u=(lon+180)/360, v=(lat+90)/180;
        return new THREE.Vector2(u,v);
      });
      const shape=new THREE.Shape(pts2d);
      const geo=new THREE.ShapeGeometry(shape,16);
      const mat=new THREE.MeshBasicMaterial({color:0x1a4d2e,side:THREE.DoubleSide});
      const m=new THREE.Mesh(geo,mat);
      m.position.z=0;
      m.scale.set(1,1,1);
    }catch(e){}
  });
  // Simple overlay: add a canvas texture with land painted
  const c=document.createElement('canvas');c.width=c.height=512;
  const ctx=c.getContext('2d');ctx.fillStyle='#0d1f3c';ctx.fillRect(0,0,512,512);
  ctx.fillStyle='#1a4d2e';
  COAST.forEach(poly=>{ctx.beginPath();poly.forEach(([lon,lat],i)=>{const x=(lon+180)/360*512,y=(lat+90)/180*512;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});ctx.closePath();ctx.fill();});
  const tex=new THREE.CanvasTexture(c);tex.magFilter=THREE.LinearFilter;
  globeG.add(new THREE.Mesh(new THREE.SphereGeometry(1.0005,64,64),new THREE.MeshBasicMaterial({map:tex,transparent:true,opacity:.4})));
}

function drawEmbeddedCoast(){
  COAST.forEach(poly=>{
    const pts=[];
    for(let i=0;i<poly.length-1;i++){
      const [lo1,la1]=poly[i],[lo2,la2]=poly[i+1];
      const n=Math.max(2,Math.ceil(Math.hypot(lo2-lo1,la2-la1)/3));
      for(let j=0;j<=n;j++){
        const t=j/n;
        pts.push(ll2v(la1+(la2-la1)*t,lo1+(lo2-lo1)*t,1.002));
      }
    }
    const g=new THREE.BufferGeometry().setFromPoints(pts);
    const l=new THREE.Line(g,coastMat);globeG.add(l);coastObjs.push(l);
  });
}

// TopoJSON arc decoder + globe line builder
function buildFromTopo(topo){
  const tf=topo.transform, arcs=topo.arcs;
  function decode(i){
    const raw=i<0?[...arcs[~i]].reverse():arcs[i];
    let x=0,y=0;const out=[];
    for(const d of raw){x+=d[0];y+=d[1];out.push([x*tf.scale[0]+tf.translate[0], y*tf.scale[1]+tf.translate[1]]);}
    return out;
  }
  function addRing(ringArcs){
    const lonlat=[];
    for(const ai of ringArcs){const seg=decode(ai);for(const p of seg)lonlat.push(p);}
    const pts=[];
    for(let i=0;i<lonlat.length-1;i++){
      const [lo1,la1]=lonlat[i],[lo2,la2]=lonlat[i+1];
      const n=Math.max(2,Math.ceil(Math.hypot(lo2-lo1,la2-la1)/4));
      for(let j=0;j<=n;j++){const t=j/n;pts.push(ll2v(la1+(la2-la1)*t,lo1+(lo2-lo1)*t,1.002));}
    }
    if(pts.length>1){const g=new THREE.BufferGeometry().setFromPoints(pts);const l=new THREE.Line(g,landMat);globeG.add(l);coastObjs.push(l);}
  }
  const obj=topo.objects.countries||topo.objects.land;
  const geoms=obj.type==='GeometryCollection'?obj.geometries:[obj];
  for(const gm of geoms){
    if(gm.type==='Polygon')for(const ring of gm.arcs)addRing(ring);
    else if(gm.type==='MultiPolygon')for(const poly of gm.arcs)for(const ring of poly)addRing(ring);
  }
}

function gcV(lo1,la1,lo2,la2){
  const v1=ll2v(la1,lo1).normalize(), v2=ll2v(la2,lo2).normalize();
  // angle between the two points
  let dot=Math.max(-1,Math.min(1,v1.dot(v2)));
  const omega=Math.acos(dot);
  // adaptive segment count: more segments for longer arcs, fewer for short hops
  const n=Math.max(12,Math.min(120,Math.round(omega*60)));
  const sinO=Math.sin(omega);
  const pts=[];
  for(let i=0;i<=n;i++){
    const t=i/n;
    let p;
    if(sinO<1e-6){ // points nearly identical — straight lerp
      p=new THREE.Vector3().lerpVectors(v1,v2,t).normalize();
    }else{ // true spherical interpolation (slerp)
      const a=Math.sin((1-t)*omega)/sinO, b=Math.sin(t*omega)/sinO;
      p=new THREE.Vector3(v1.x*a+v2.x*b, v1.y*a+v2.y*b, v1.z*a+v2.z*b);
    }
    const h=0.05*Math.sin(Math.PI*t); // smooth arch, max at midpoint
    pts.push(p.multiplyScalar(1+h));
  }
  return pts;
}

let gLines=[];
function draw(){
  gLines.forEach(l=>globeG.remove(l));gLines=[];
  const fs=gfl();
  document.getElementById('stat').textContent=fs.length+' trechos';
  const aps=new Set(fs.flatMap(f=>[f.o,f.d]));
  const dg=new THREE.SphereGeometry(.011,8,8);
  fs.forEach(f=>{
    if(!AP[f.o]||!AP[f.d])return;
    const [lo1,la1]=AP[f.o],[lo2,la2]=AP[f.d];
    const g=new THREE.BufferGeometry().setFromPoints(gcV(lo1,la1,lo2,la2));
    const l=new THREE.Line(g,new THREE.LineBasicMaterial({color:new THREE.Color(TC[f.t]||TC.default),opacity:1,transparent:true,depthTest:true,depthWrite:false,linewidth:3,fog:false}));
    globeG.add(l);gLines.push(l);
  });
  aps.forEach(code=>{
    if(!AP[code])return;
    const [lon,lat]=AP[code];
    const isCWB=code==='CWB';
    const m=new THREE.Mesh(dg,new THREE.MeshBasicMaterial({color:isCWB?0xffdd44:0x77ccff,emissive:isCWB?0xffaa00:0x3388ff}));
    m.position.copy(ll2v(lat,lon,1.01));
    globeG.add(m);gLines.push(m);
  });
}
